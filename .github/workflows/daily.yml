name: Daily prediction

on:
  schedule:
    # Target 4:05 PM America/New_York (weekdays), a few minutes after the cash
    # close so yfinance has the day's bar. GitHub cron is UTC-only, so we fire
    # at both 20:05 and 21:05 UTC and gate on NY local time (see job below).
    - cron: "5 20 * * 1-5"
    - cron: "5 21 * * 1-5"
  workflow_dispatch:        # Allow manual runs from the Actions tab.
  push:
    branches: [ main ]      # Re-render on any code change.
    paths:
      - "pipeline/**"
      - "scripts/**"
      - ".github/workflows/daily.yml"

permissions:
  contents: write           # Required so the bot can push docs/ updates.

concurrency:
  group: daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # S&P 500 + yfinance can be slow on cold cache
    steps:
      - name: Gate — 4:05 PM America/New_York only
        id: ny_gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Run: ${{ github.event_name }} (not subject to schedule gate)."
            exit 0
          fi
          h=$(TZ=America/New_York date +%H)
          m=$(TZ=America/New_York date +%M)
          dow=$(TZ=America/New_York date +%u)
          if [ "$dow" -gt 5 ] || [ "$h" != "16" ] || [ "$m" != "05" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Skip: NY time is $(TZ=America/New_York date '+%H:%M %Z, %u') (want 16:05 Mon–Fri)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Run: $(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')."
          fi

      - name: Check out repo
        if: steps.ny_gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.ny_gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.ny_gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily prediction
        if: steps.ny_gate.outputs.run == 'true'
        env:
          # Optional: override `pipeline.config.Config.live_portfolio_start` (ISO date).
          # Leave unset to use the default in code (currently first live fills on/after that date).
          LIVE_PORTFOLIO_START: ${{ vars.LIVE_PORTFOLIO_START }}
          # Optional: `core` = 54-stock sleeve (faster). Default / empty = S&P 500 CSV.
          UNIVERSE: ${{ vars.UNIVERSE }}
        run: python scripts/run_daily.py

      - name: Commit updated artifacts
        if: steps.ny_gate.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily: update predictions and tracker [skip ci]"
            git push
          fi
